services:
  frontend:
    build:
      context: ./dashboard
    container_name: frontend
    ports:
      - "4200:4200"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    command: npm start
    networks:
      - app-network

  backend:
    build:
      context: ./authLaravel
    container_name: backend
    ports:
      - "8080:80"
    volumes:
      - ./authLaravel:/var/www/html
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_DATABASE: laravel
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker-/logs
      
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:

volumes:
  db_data:
