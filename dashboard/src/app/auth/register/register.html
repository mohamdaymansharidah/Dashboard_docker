<div class="flex justify-center items-center p-12">

  <form class="space-y-5" [formGroup]="form" (ngSubmit)="onRegister()">
    <div class="space-y-2">
      <label for="email" class="block text-sm font-medium text-gray-700">
        Email Address
      </label>
      <input
        id="Username"
        pInputText
        formControlName="Username"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
        placeholder="Enter your email"
        [ngClass]="{
            'border-red-500': Username?.invalid && (Username?.touched || Username?.dirty),
            'border-gray-300': Username?.valid || !Username?.touched
          }"
        required
      >
      <small *ngIf="Username?.invalid && (Username?.touched || Username?.dirty)" class="text-red-500">
        <span *ngIf="Username?.errors?.['required']">Email is required.</span>
      </small>
    </div>
    <div class="space-y-2">
      <label for="password" class="block text-sm font-medium text-gray-700">
        Password
      </label>
      <input
        id="password"
        pInputText
        formControlName="password"
        type=""
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
        placeholder="Enter your password"
        [ngClass]="{
            'border-red-500': password?.invalid && (password?.touched || password?.dirty),
            'border-gray-300': password?.valid || !password?.touched
          }"
        required
      >
      <small *ngIf="password?.invalid && (password?.touched || password?.dirty)" class="text-red-500">
        <span *ngIf="password?.errors?.['required']">Password is required.</span>
        <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters.</span>
      </small>


    </div>
    <div class="space-y-2">
      <label  for="confirmPassword" class="block text-sm font-medium text-gray-700">
        confirm Password
      </label>
      <input
        id="confirmPassword"
        pInputText
        formControlName="confirmPassword"
        type="password"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
        placeholder="Create a strong password"
        name="confirmPassword"
        required
        [ngClass]="{
          'border-red-500': confirmPassword?.invalid && (confirmPassword?.touched || confirmPassword?.dirty),
          'border-gray-300': confirmPassword?.valid || !confirmPassword?.touched
          }"
      >
      <small *ngIf="confirmPassword?.invalid && (confirmPassword?.touched || confirmPassword?.dirty)" class="text-red-500">
        Email is required.
      </small>
    </div>
    <button
      type="submit"
      pButton
      [disabled]="form.invalid"
      class="w-full bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg"
    >
      Sign In
    </button>
    <!-- Footer -->
    <div class="mt-8 text-center">
      <p class="text-sm text-gray-600 mb-4">
         have an account?
        <a routerLink="../login" class="text-blue-600 hover:text-blue-700 font-medium transition-colors">
          go login
        </a>
      </p>
      <p class="text-sm text-gray-600 mb-4">
          forgot password?
        <a routerLink="../forget-password"  class="text-blue-600 hover:text-blue-700 font-medium transition-colors">
          Reset password
        </a>
      </p>


      <div class="pt-4 border-t border-gray-200">
        <p class="text-xs text-gray-500 leading-relaxed">
          🔐 Secure login with encrypted data transmission
        </p>
      </div>
    </div>
  </form>
</div>
