<div class="flex justify-center items-center">
  <div class="p-12 mt-12 rounded-2xl bg-amber-300">
    <img [src]="'Dropped Image.png'" alt="Login Image" />
  </div>

  <form class="space-y-5 mt-12 rounded-2xl" [formGroup]="form" (ngSubmit)="onRegister()">
    <div class="space-y-2">
      <label for="email" class="block text-sm font-medium text-gray-700"> Username </label>
      <input
        id="name"
        pInputText
        formControlName="name"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg"
        placeholder="Enter your name"
        [ngClass]="{
          'border-red-500': name?.invalid && (name?.touched || name?.dirty),
          'border-gray-300': name?.valid || !name?.touched,
        }"
        required
      />
      <small *ngIf="name?.invalid && (name?.touched || name?.dirty)" class="text-red-500">
        <span *ngIf="name?.errors?.['required']">Name is required.</span>
      </small>
    </div>
    <div class="space-y-2">
      <label for="email" class="block text-sm font-medium text-gray-700"> email </label>
      <input
        id="email"
        pInputText
        formControlName="email"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg"
        placeholder="Enter your email"
        [ngClass]="{
          'border-red-500': email?.invalid && (email?.touched || email?.dirty),
          'border-gray-300': email?.valid || !email?.touched,
        }"
        required
      />
      <small *ngIf="email?.invalid && (email?.touched || email?.dirty)" class="text-red-500">
        <span *ngIf="email?.errors?.['required']">Email is required.</span>
      </small>
    </div>
    <div class="space-y-2">
      <label for="password" class="block text-sm font-medium text-gray-700"> Password </label>
      <input
        id="password"
        pInputText
        formControlName="password"
        type=""
        class="w-full px-4 py-3 border border-gray-300 rounded-lg"
        placeholder="Enter your password"
        [ngClass]="{
          'border-red-500': password?.invalid && (password?.touched || password?.dirty),
          'border-gray-300': password?.valid || !password?.touched,
        }"
        required
      />
      <small
        *ngIf="password?.invalid && (password?.touched || password?.dirty)"
        class="text-red-500"
      >
        <span *ngIf="password?.errors?.['required']">Password is required.</span>
        <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters.</span>
      </small>
    </div>
    <div class="space-y-2">
      <label for="confirmPassword" class="block text-sm font-medium text-gray-700">
        confirm Password
      </label>
      <input
        id="confirmPassword"
        pInputText
        formControlName="confirmPassword"
        type="password"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg"
        placeholder="Create a strong password"
        name="confirmPassword"
        required
        [ngClass]="{
          'border-red-500':
            confirmPassword?.invalid && (confirmPassword?.touched || confirmPassword?.dirty),
          'border-gray-300': confirmPassword?.valid || !confirmPassword?.touched,
        }"
      />
      <small
        *ngIf="confirmPassword?.invalid && (confirmPassword?.touched || confirmPassword?.dirty)"
        class="text-red-500"
      >
        Email is required.
      </small>
    </div>
    <button
      type="submit"
      [disabled]="form.invalid"
      pButton
      class="w-full bg-primary hover:bg-primary-hover text-white font-semibold py-3 px-4 rounded-lg"
    >
      Sign In
    </button>
    <!-- Footer -->
    <div class="mt-8 text-center">
      <p class="text-sm text-gray-600 mb-4">
        have an account?
        <a
          routerLink="../login"
          class="text-blue-600 hover:text-blue-700 font-medium transition-colors"
        >
          go login
        </a>
      </p>

      <div class="pt-4 border-t border-gray-200">
        <p class="text-xs text-gray-500 leading-relaxed">
          🔐 Secure login with encrypted data transmission
        </p>
      </div>
    </div>
  </form>
</div>
