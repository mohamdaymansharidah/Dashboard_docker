<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-5xl bg-white rounded-3xl shadow-xl overflow-hidden grid md:grid-cols-2">
    <!-- Left Image Section -->
    <div class="hidden md:flex items-center justify-center  p-10">
      <img [src]="'Dropped Image.png'" alt="Login Image" class="w-full max-w-xs object-contain" />
    </div>

    <!-- Form Section -->
    <div class="p-8 md:p-12">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Create Account</h2>

      <form class="space-y-5" [formGroup]="form" (ngSubmit)="onRegister()">
        <!-- Name -->
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Username</label>
          <input
            type="text"
            formControlName="name"
            placeholder="Enter your name"
            class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-amber-400 focus:outline-none transition"
            [ngClass]="{
              'border-red-500': name?.invalid && (name?.touched || name?.dirty),
              'border-gray-300': name?.valid || !name?.touched,
            }"
          />
          <small
            *ngIf="name?.invalid && (name?.touched || name?.dirty)"
            class="text-red-500 text-xs"
          >
            Name is required.
          </small>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Email</label>
          <input
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-amber-400 focus:outline-none transition"
            [ngClass]="{
              'border-red-500': email?.invalid && (email?.touched || email?.dirty),
              'border-gray-300': email?.valid || !email?.touched,
            }"
          />
          <small
            *ngIf="email?.invalid && (email?.touched || email?.dirty)"
            class="text-red-500 text-xs"
          >
            Email is required.
          </small>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Password</label>
          <input
            type="string"
            formControlName="password"
            placeholder="Enter your password"
            class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-amber-400 focus:outline-none transition"
            [ngClass]="{
              'border-red-500': password?.invalid && (password?.touched || password?.dirty),
              'border-gray-300': password?.valid || !password?.touched,
            }"
          />
          <small
            *ngIf="password?.invalid && (password?.touched || password?.dirty)"
            class="text-red-500 text-xs"
          >
            <span *ngIf="password?.errors?.['required']">Password is required.</span>
            <span *ngIf="password?.errors?.['minlength']">Min 6 characters.</span>
          </small>
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Confirm Password</label>
          <input
            type="password"
            formControlName="confirmPassword"
            placeholder="Confirm password"
            class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-amber-400 focus:outline-none transition"
            [ngClass]="{
              'border-red-500':
                confirmPassword?.invalid && (confirmPassword?.touched || confirmPassword?.dirty),
              'border-gray-300': confirmPassword?.valid || !confirmPassword?.touched,
            }"
          />
          <small
            *ngIf="confirmPassword?.touched || confirmPassword?.dirty"
            class="text-red-500 text-xs"
          >
            <span *ngIf="confirmPassword?.errors?.['required']">
              Confirm password is required.
            </span>

            <span *ngIf="form.errors?.['passwordMismatch']"> Passwords do not match. </span>
          </small>
        </div>

        <!-- Button -->
        <div class="flex item-center justify-center">
          <button
            type="submit"
            [disabled]="form.invalid"
            class="bg-primary hover:bg-primary cursor-pointer text-white font-semibold py-3 rounded-lg transition p-4 w-full disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Sign Up
          </button>
        </div>

        <!-- Footer -->
        <div class="text-center pt-4 border-t">
          <p class="text-sm text-gray-600">
            Already have an accountss?
            <a routerLink="../login" class="text-amber-500 hover:underline font-medium"> Login </a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
