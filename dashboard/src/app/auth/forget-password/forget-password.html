<div class="flex items-center justify-center p-12">
  <div class="flex items-center justify-center">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="flex flex-col space-y-2">
        <label>email</label>
        <input pInputText type="email" formControlName="email" placeholder="Enter your email" />
        <small *ngIf="email?.invalid && (email?.touched || email?.dirty)" class="text-red-500">
          {{ email?.errors?.['required'] ? 'Email is required.' : 'Email is invalid.' }}
        </small>

        <button
          type="submit"
          pButton
          [disabled]="form.invalid"
          class="w-full bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg"
        >
          Send Reset Link
        </button>
      </div>
    </form>
  </div>
</div>
<div class="flex items-center justify-center">
  <Button
    type="button"
    pButton
    class="bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg"
    (click)="goBack()"
  >
    Back to Login
  </Button>
</div>
